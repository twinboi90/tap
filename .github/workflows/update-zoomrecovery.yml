name: Auto-update zoomrecovery formula

on:
  schedule:
    - cron: '0 * * * *'  # hourly
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for new release and update formula
        run: |
          LATEST=$(curl -s https://api.github.com/repos/twinboi90/ZoomRecovery/releases/latest \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")

          CURRENT=$(sed -n 's|.*releases/download/\([^/]*\)/zoomrecovery.*|\1|p' Formula/zoomrecovery.rb)

          echo "Latest release: $LATEST"
          echo "Formula version: $CURRENT"

          if [ "$LATEST" = "$CURRENT" ]; then
            echo "Already up to date."
            exit 0
          fi

          BINARY_URL="https://github.com/twinboi90/ZoomRecovery/releases/download/${LATEST}/zoomrecovery"
          SHA256=$(curl -sL "$BINARY_URL" | sha256sum | awk '{print $1}')

          sed -i "s|url \".*\"|url \"${BINARY_URL}\"|" Formula/zoomrecovery.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/zoomrecovery.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/zoomrecovery.rb
          git commit -m "Update zoomrecovery to ${LATEST}"
          git push
